<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	
	<link rel="stylesheet" href="style.css">
	<title>Four famous nebulae</title>
</head>
<body>
<header class="hero">
	<h1 class="heading-medium outlined-text">FOUR FAMOUS NEBULAE</h1>
	<nav class="card-nav">
		<a class="card">
			<img src="assets/images/M16-IRAC-MIPS-fs.png"
				alt="Infrared capture of the Eagle nebula - a webby, green fog with a red glow radiating from the center."
				>
			<div class="overlay">
				<span class="card-heading outlined-text">M16</span>
				<span class="heading-medium outlined-text center-text">Eagle Nebula</span>
			</div>
		</a>
		<a class="card">
			<img src="assets/images/M17-infra.png"
				alt="Infrared capture of the Omega Nebula - a clear V-shape with green radiation inside."
			>
			<div class="overlay">
				<span class="card-heading outlined-text">M17</span>
				<span class="heading-medium outlined-text center-text">Omega Nebula</span>
			</div>
		</a>
		<a class="card">
			<img src="assets/images/M20-NSF-DOE-IRGU-fs.png"
				alt="The Trifid nebula expanded beyond visible light - a pink ball on a blue smoke with black streaks running across."
			>
			<div class="overlay">
				<span class="card-heading outlined-text">M20</span>
				<span class="heading-medium outlined-text center-text">Trifid Nebula</span>
			</div>
		</a>
		<a class="card">
			<img src="assets/images/M8-combined-fs.png"
				alt="The Lagoon nebula in visible light and infrared - a column of dark smoke against a blue fog."
			>
			<div class="overlay">
				<span class="card-heading outlined-text">M8</span>
				<span class="heading-medium outlined-text center-text">Lagoon Nebula</span>
			</div>
		</a>
	</nav>
</header>
	
<main>
	<section class="intro">
		
	</section>
	<article id="m16">
		<div class="banner">
			<img src="assets/images/M17-M16-Sharpless-2-64-HaRGB-banner.png"
				alt="Starfilled space with M17 top left and M16 center."	
			>
			<h1 class="overlay heading-large outlined-text">
				<span class="right-aligned">Messier 16</span>
				<span class="divider">::</span>
				<span>Eagle Nebula</span>
			</h1>
		</div>
		<div class="bg-gradient">
			<section class="split-h-2">
				<p>Here there will be a nice intro to the Eagle nebula, also known as M16.
					Many points will be made and interesting facts pointed out.
				</p>
				<div class="hover-frame" id="m16-v-i">
					<figure class="hide-on-hover">
						<img src="assets/images/M16-RVB-tranl-hoverframe.png"
							alt="The Eagle Nebula in visible light. It is mostly red."
							>
							<figcaption>The Eagle Nebula with filters mapped to color channels to represent visible light (RVB). Notice the prominent tendrils in the center, among them the famous "Pillars of Creation". Hover the image to view an infrared capture.</figcaption>
					</figure>
					<figure class="show-on-hover overlay">
						<img src="assets/images/M16-IRAC-MIPS-transl-hoverframe.png"
						alt="The Eagle Nebula in infrared. It is mostly green with a red radiation."
						>
						<figcaption>The image is a combination of infrared data (IRAC + MIPS) mapped to the color channels.</figcaption>
					</figure>
				</div>
			</section>
			<section class="split-h-2 pillar-bg-gradient">
				<figure id="m16-pillar">
					<img src="assets/images/M16-pillar.png"
						alt="A pillar in M16 glowing red at its base and blue at its head."
					>
					<figcaption>The height of this pillar spans 9.5 light-years, aprx. 7000 light-years from earth in the Serpens constallation. <b>Credit:</b> ESA/Hubble & NASA, K. Noll</figcaption>
				</figure>
			</section>
			<section></section>
		</div>
	</article>
	<article id="m17">
		
	</article>
	<article id="m20">
		
	</article>
	<article id="m8">
		
	</article>
</main>
<footer></footer>
</body>
</html>
