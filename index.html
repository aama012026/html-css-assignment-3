<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	
	<link rel="stylesheet" href="style.css">
	<title>Four famous nebulae</title>
</head>
<body>
	<header>
		<h1>FOUR FAMOUS NEBULAE</h1>
		<nav>
			<a class="card-link">
				<span class="top-text">M16</span>
				<span class="bot-text">Eagle Nebula</span>
			</a>
			<a class="card-link">
				<span class="top-text">M17</span>
				<span class="bot-text">Omega Nebula</span>
			</a>
			<a class="card-link">
				<span class="top-text">M20</span>
				<span class="bot-text">Trifid Nebula</span>
			</a>
			<a class="card-link">
				<span class="top-text">M8</span>
				<span class="bot-text">Lagoon Nebula</span>
			</a>

	</header>
	<main>
		<section class="intro">
			
		</section>
		<article id="m16">
			<h1 class="banner">
				<span class="right-aligned">Messier 16</span>
				<span>::</span>
				<span>Eagle Nebula</span>
			</h1>
			<div class="bg-gradient">
				<section>
					<p></p>
					<div class="hover-frame">
						<figure>
							<img src="#"
								alt="The Eagle Nebula in visible light. It is mostly red.">
								<figcaption>The Eagle Nebula with filters mapped to color channels to represent visible light (RVB). Notice the prominent tendrils in the center, among them the famous "Pillars of Creation". Hover the image to view an infrared capture.</figcaption>
						</figure class="hidden">
						<figure>
							<img src="#"
							alt="The Eagle Nebula in infrared. It is mostly green with a red radiation.">
							<figcaption>The image is a combination of infrared data (IRAC + MIPS) mapped to the color channels.</figcaption>
						</figure>
					</div>
				</section>
				<section></section>
				<section></section>
			</div>
		</article>
		<section id="m17">
			
		</section>
		<section id="m20">
			
		</section>
		<section id="m8">
			
		</section>

	<footer></footer>

</html>
