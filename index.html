<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	
	<link rel="stylesheet" href="style.css">
	<title>Four famous nebulae</title>
</head>
<body>
	<header class="hero">
		<h1 class="heading-medium outlined-text">FOUR FAMOUS NEBULAE</h1>
		<nav class="card-nav">
			<a class="card">
				<img src="assets/images/M16-IRAC-MIPS-fs.png"
					alt="Infrared capture of the Eagle nebula - a webby, green fog with a red glow radiating from the center."
					>
				<div class="overlay outlined-text">
					<span class="card-heading">M16</span>
					<span class="heading-medium center-text">Eagle Nebula</span>
				</div>
			</a>
			<a class="card">
				<img src="assets/images/M17-infra.png"
					alt="Infrared capture of the Omega Nebula - a clear V-shape with green radiation inside."
				>
				<div class="overlay outlined-text">
					<span class="card-heading">M17</span>
					<span class="heading-medium center-text">Omega Nebula</span>
				</div>
			</a>
			<a class="card">
				<img src="assets/images/M20-NSF-DOE-IRGU-fs.png"
					alt="The Trifid nebula expanded beyond visible light - a pink ball on a blue smoke with black streaks running across."
				>
				<div class="overlay outlined-text">
					<span class="card-heading">M20</span>
					<span class="heading-medium center-text">Trifid Nebula</span>
				</div>
			</a>
			<a class="card">
				<img src="assets/images/M8-combined-fs.png"
					alt="The Lagoon nebula in visible light and infrared - a column of dark smoke against a blue fog."
				>
				<div class="overlay outlined-text">
					<span class="card-heading">M8</span>
					<span class="heading-medium center-text">Lagoon Nebula</span>
				</div>
			</a>
		</nav>
	</header>
	<main>
		<section class="intro">
			
		</section>
		<article id="m16">
			<div class="banner">
				<img src="assets/images/M17-M16-Sharpless-2-64-HaRGB-banner.png"
					alt="Starfilled space with M17 top left and M16 center."	
				>
				<h1 class="heading-large outlined-text">
					<span class="right-aligned">Messier 16</span>
					<span class="divider">::</span>
					<span>Eagle Nebula</span>
				</h1>
			</div>
			<div class="bg-gradient">
				<section>
					<p></p>
					<div class="hover-frame">
						<figure>
							<img src="#"
								alt="The Eagle Nebula in visible light. It is mostly red."
								>
								<figcaption>The Eagle Nebula with filters mapped to color channels to represent visible light (RVB). Notice the prominent tendrils in the center, among them the famous "Pillars of Creation". Hover the image to view an infrared capture.</figcaption>
						</figure class="hidden">
						<figure>
							<img src="#"
							alt="The Eagle Nebula in infrared. It is mostly green with a red radiation."
							>
							<figcaption>The image is a combination of infrared data (IRAC + MIPS) mapped to the color channels.</figcaption>
						</figure>
					</div>
				</section>
				<section></section>
				<section></section>
			</div>
		</article>
		<section id="m17">
			
		</section>
		<section id="m20">
			
		</section>
		<section id="m8">
			
		</section>
	</main>
	<footer></footer>
</body>
</html>
